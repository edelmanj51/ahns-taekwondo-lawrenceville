REVIEWER_1_NAME: "Emil"
REVIEWER_1_DATE: "3 months ago"
REVIEWER_1_TEXT: "We chose Ahn's Taekwondo over a closer studio to our home — Master Park was the main reason. He's wonderful with kids; his approach instills discipline with kindness that younger kids really respond to. Our son has been coming here for over three years and he loves it. Everyone is great, including Master Howe. Taekwondo has been great for our son, teaching him to be a good, responsible, kind young man."

REVIEWER_2_NAME: "Sabrina"
REVIEWER_2_DATE: "2 months ago"
REVIEWER_2_TEXT: "Ahn's Taekwondo has been an amazing experience for my daughter and our family. She has been trained here for a year. We have seen tremendous growth in both her skills and confidence. Master Park is wonderful with the kids — very patient, kind, and always encouraging. He creates a positive and motivating environment where students feel supported and excited to learn."

REVIEWER_3_NAME: "Thomas Brophy"
REVIEWER_3_DATE: "2 months ago"
REVIEWER_3_TEXT: "I started at Ahn's Taekwondo in October and it has truly felt like a second home. Everyone has been incredibly welcoming, supportive, and encouraging. I'm so glad I decided to start Taekwondo again — it had been 10 years since I last practiced. The Masters are patient, motivating, and understanding, no matter your experience level. I couldn't have picked a better place to train."

