ABOUT_TEXT: "At Ahn's Taekwondo Lawrenceville, we believe Taekwondo is the key to strengthening the mind, body, and spirit — regardless of age or background. Beyond mastering techniques like the roundhouse kick, we teach the values of respect, perseverance, and confidence, helping every student reach their fullest potential."

INSTRUCTOR_1_NAME: "Master Hongryong Park"
INSTRUCTOR_1_PHOTO: images/instructor/master-park.jpg
INSTRUCTOR_1_TITLE: "6th Degree Black Belt · Head Instructor & Owner"
INSTRUCTOR_1_BIO: "Master Hongryong Park is one of the youngest Kukkiwon-Certified 6th Degree Black Belts in the world. A former competitive athlete in South Korea who trained 7–8 hours daily, he has won numerous Gold Medals in Korean Taekwondo Sparring Tournaments. After 14 years as Head Instructor at Ahn's Montgomery location, he now leads the Lawrenceville academy with the same dedication, discipline, and warmth that keeps students coming back year after year."

INSTRUCTOR_2_NAME: "Master Liza Howe"
INSTRUCTOR_2_PHOTO: images/instructor/master-howe.jpg
INSTRUCTOR_2_TITLE: "4th Degree Black Belt · Instructor"
INSTRUCTOR_2_BIO: "Master Liza Howe began Taekwondo in 2014 through Ahn's parents program in Skillman, inspired by her daughter's 2nd Degree Black Belt. A Kukkiwon-certified 4th Degree, she has competed locally, regionally, nationally, and internationally — with forms as her specialty. She has been an active instructor at Ahn's since 2016."

INSTRUCTOR_3_NAME: "Instructor Sophia Cruz"
INSTRUCTOR_3_PHOTO: images/instructor/instructor-3.jpg
INSTRUCTOR_3_TITLE: "3rd Degree Black Belt · Junior Instructor"
INSTRUCTOR_3_BIO: "Sophia Cruz has trained in Taekwondo since age 4, earning her first Black Belt in 2019. She joined Ahn's Taekwondo Lawrenceville in 2022 and earned her 2nd Degree in May 2024. Her dedication and love for the art make her a natural mentor for younger students."

